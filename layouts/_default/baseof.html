<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{{ if .IsHome }}howrex — How to do anything{{ else }}{{ .Title }} — howrex{{ end }}</title>
  <meta name="description" content="{{ if .Description }}{{ .Description }}{{ else }}Clear, practical tutorials on tech, finance, home, and more.{{ end }}" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/main.css" />
</head>
<body>

  <nav class="nav">
    <div class="nav-in">
      <a class="logo" href="/">how<em>rex</em></a>
      <div class="nsearch">
        <span class="si">⌕</span>
        <input placeholder="Search tutorials..." />
      </div>
      <div class="nlinks">
        <a href="/js">Tech</a>
        <a href="/finance">Finance</a>
        <a href="/diy">DIY</a>
      </div>
    </div>
  </nav>

  <main>
    {{ block "main" . }}{{ end }}
  </main>

  <footer class="footer">
    <p>{{ now.Year }} howrex.com · Clear tutorials for everyone</p>
  </footer>

</body>
</html>
